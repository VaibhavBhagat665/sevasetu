services:
  # FastAPI Backend Service
  - type: web
    name: sevasetu-backend
    env: python
    region: singapore # Closest to India
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      # Keyword fallback will activate since AWS keys aren't added, perfectly fine for demo
      # Add GEMINI_API_KEY manually in Render dashboard if needed

  # React Frontend Service
  - type: web
    name: sevasetu-frontend
    env: static
    region: singapore
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: sevasetu-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
